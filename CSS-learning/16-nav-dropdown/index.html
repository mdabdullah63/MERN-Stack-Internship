<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar dropdown</title>

    <style>
        .nav {
            background-color: #2c3e50;
        }

        .nav-item {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px;
        }

        a {
            color: rgb(218, 185, 185);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            display: block;
        }

        .home {
            background-color: aqua;
            color: black;
        }

        a:hover {
            background-color: #639d91;
            color: black;
        }

        .abc {
            display: none;
            background-color: #34495e;
            position: absolute;
            margin-top: 5px;
        }

        .home-container:hover .abc {
            display: block;
        }

        .drop {
            width: 200px;
            margin: 20px;
            padding: 12px;
        }

        .drop-item {
            display: none;
        }

        .drop:hover .drop-item {
            display: block;
        }
    </style>
</head>

<body>

    <div class="nav">
        <div class="nav-item">

            <div class="home-container">
                <a class="home" href="#Home">Home</a>

                <div class="abc">
                    <a href="#Home">Home</a>
                    <a href="#about">About</a>
                    <a href="#Contact">Contact</a>
                    <a href="#Blog">Blog</a>
                </div>
            </div>

            <a href="#about">About</a>
            <a href="#Contact">Contact</a>
            <a href="#Blog">Blog</a>

        </div>
    </div>

    <div class="drop">
        HEY cursor on me
        <div class="drop-item">hello what happens</div>
    </div>

</body>

</html>
