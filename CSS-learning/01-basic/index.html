<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic css</title>
    <style>
        /* element selector */
        p {
            color: dimgray;
        }

        /* class selector */
        .highlight {
            background-color: yellow;
        }

        /* id selector */
        #intro {
            font-size: 20px;
        }

        h1 {
            /* color name */
            color: Tomato
        }

        h2 {
            /* hex value */
            color: #1e90ff
        }

        p {
            /* rgb value */
            color: rgb(60, 179, 113)
        }
    </style>
</head>

<body>

    <h1>Color Name</h1>
    <h2>Hex Value</h2>
    <p>RGB Value</p>
    <p id="intro">Welcome to CSS selectors.</p>
    <p>This is a normal paragraph.</p>
    <p class="highlight">This paragraph is highlighted.</p>
</body>

</html>
