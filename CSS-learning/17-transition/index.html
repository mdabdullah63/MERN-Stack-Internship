<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition concepts</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: rgb(92, 60, 252);
            border: 2px solid red;
            transition: width 2s, height 4s, background-color 3s, transform 2s;
        }

        div:hover {
            width: 400px;
            height: 400px;
            background-color: rgb(43, 81, 130);
            transform: rotate(360deg);
        }
    </style>
</head>

<body>
    <div>

    </div>
    <p>hello this is me md abdullah hello

    </p>
</body>

</html>
