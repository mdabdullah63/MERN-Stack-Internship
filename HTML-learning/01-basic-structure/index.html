<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Every HTML page content goes inside the body -->

    <h1>HTML Basic Page Structure</h1>

    <p>
        This is the basic skeleton of every HTML document.
        All websites start with this structure.
    </p>

    <h1>HTML Element</h1>
    <!--The HTML element is everything from the start tag to the end tag:

        <tagname>Content goes here...</tagname>
    -->

    <h1>HTML Attributes</h1>
    <!--Attributes provide additional information about an element.
     They are always included in the opening tag.
     -->
    <p>
        Example of an attribute: <br>

</body>

</html>
