<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Colors</title>
</head>

<body>

    <h1 style="color: blue;">HTML Colors</h1> <!-- simple color name -->

    <p style="color: red;">This text uses a color name.</p>

    <!-- RGB COLOR -->
    <!-- rgb(red, green, blue) -->
    <!-- each value goes from 0 to 255 -->
    <!-- 255 means full color, 0 means no color -->

    <p style="color: rgb(255,0,0);">RGB example: red color</p> <!-- red full, others 0 -->
    <p style="color: rgb(0,255,0);">RGB example: green color</p> <!-- green full -->
    <p style="color: rgb(0,0,255);">RGB example: blue color</p> <!-- blue full -->



    <!-- HEX COLOR -->
    <!-- format: #RRGGBB -->
    <!-- RR = red value -->
    <!-- GG = green value -->
    <!-- BB = blue value -->

    <p style="color: #FF0000;">HEX example: red color</p> <!-- red -->
    <p style="color: #00FF00;">HEX example: green color</p> <!-- green -->
    <p style="color: #0000FF;">HEX example: blue color</p> <!-- blue -->



    <!-- HSL COLOR -->
    <!-- HSL = Hue, Saturation, Lightness -->
    <!-- Hue: color type (0-360) -->
    <!-- Saturation: color strength (%) -->
    <!-- Lightness: brightness (%) -->

    <p style="color: hsl(0,100%,50%);">HSL example: red color</p> <!-- hue 0 -->
    <p style="color: hsl(120,100%,50%);">HSL example: green color</p> <!-- hue 120 -->
    <p style="color: hsl(240,100%,50%);">HSL example: blue color</p> <!-- hue 240 -->

</body>

</html>
