<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Learning - Links</title>
</head>

<body style="background-color:powderblue;">

    <h1>HTML Links</h1>

    <p>
        Links allow users to navigate from one webpage to another. The anchor tag is used to create links.
    </p>

    <a href="https://www.google.com">Visit Google</a>


    <h1>This is a heading</h1>
    <p>This is a paragraph.</p>
    <a href="https://www.example.com">Visit Example</a>
    <!-- note: the href attribute specifies the URL of the page the link goes to. -->
    <h1 style="text-align:center;">Centered Heading</h1>
    <p style="text-align:center;">Centered paragraph.</p>
    <a href="https://www.example.com" style="display:block; text-align:center;">Centered Link</a>
</body>

</html>
