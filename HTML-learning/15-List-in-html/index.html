<!DOCTYPE html>
<html>

<head>
    <title>html list tags</title>
</head>

<body>

    <h1>these are types of list</h1>

    <!-- unordered list: creates a bullet list -->
    <ul>
        <li>apple</li>
        <li>banana</li>
        <li>cherry</li>
    </ul>

    <!-- ordered list: creates a numbered list -->
    <ol>
        <li>wake up</li>
        <li>brush teeth</li>
        <li>have breakfast</li>
    </ol>

    <!-- list item: represents each item inside <ul> or <ol> -->
    <ul>
        <li>item 1</li>
        <li>item 2</li>
    </ul>

    <!-- description list: groups terms and descriptions -->
    <dl>
        <dt>html</dt> <!-- term -->
        <dd>hypertext markup language</dd> <!-- description -->

        <dt>css</dt>
        <dd>cascading style sheets</dd>
    </dl>

    <!-- description term: defines the term inside <dl> -->
    <dl>
        <dt>javascript</dt>
        <dd>scripting language for web pages</dd>
    </dl>

    <!-- description details: describes the term defined in <dt> -->
    <dl>
        <dt>python</dt>
        <dd>high-level programming language</dd>
    </dl>

</body>

</html>
