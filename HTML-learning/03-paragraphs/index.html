<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Learning - Paragraphs</title>
</head>

<body>

    <h1>HTML Paragraphs</h1>

    <p>
        The paragraph tag is used to display text content.
        Browsers automatically add space before and after paragraphs.
    </p>
        <!-- note: the <p> tag is a block-level element, which means it starts on a new line and takes up the full width available. -->
    <p>This is the first paragraph.</p>
    <hr>
    <!-- This is a horizontal rule is used to create a thematic break between sections -->
    <p>This is another paragraph example.</p>

</body>

</html>
