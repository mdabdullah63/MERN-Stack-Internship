<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Text Formatting</title>
</head>

<body>

    <h1>HTML Text Formatting Examples</h1>

    <!-- Bold text -->
    <p>This is <b>Bold Text</b></p>

    <!-- Important text (semantic meaning) -->
    <p>This is <strong>Important Text</strong></p>

    <!-- Italic text -->
    <p>This is <i>Italic Text</i></p>

    <!-- Emphasized text (used for stress) -->
    <p>This is <em>Emphasized Text</em></p>

    <!-- Highlighted text -->
    <p>This is <mark>Highlighted Text</mark></p>

    <!-- Smaller text -->
    <p>This is <small>Smaller Text</small></p>

    <!-- Deleted text (used for removed content) -->
    <p>This is <del>Deleted Text</del></p>

    <!-- Inserted text -->
    <p>This is <ins>Inserted Text</ins></p>

    <!-- Subscript example -->
    <p>Water formula: H<sub>2</sub>O</p>

    <!-- Superscript example -->
    <p>Einstein formula: E = mc<sup>2</sup></p>

</body>

</html>
