<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Comments</title>
</head>

<body>

    <h1>HTML Comments</h1>

    <p>HTML comments are not displayed in the browser.</p>

    <!-- Write your comments here -->
    <p>This paragraph is visible.</p>

    <!-- Hide Content Example -->
    <!-- 
    <p>This paragraph is hidden using a comment.</p>
    <p>This line will also not appear on the webpage.</p>
    -->

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolores impedit provident facilis illum corrupti.</p>

    <!-- Hide Inline Content Example -->
    <p>This is <!-- hidden text --> a paragraph with hidden inline content.</p>

</body>

</html>
