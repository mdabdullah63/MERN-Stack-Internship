<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Learning - Headings</title>
</head>

<body>

    <h1>HTML Headings</h1>

    <p>
        Headings are used to define titles and subtitles in a webpage.
        HTML provides six heading levels from h1 to h6.
    </p>
    <h1>Main Heading</h1>
    <h2>Sub Heading</h2>
    <h3>Section Heading</h3>
    <h4>Small Heading</h4>
    <h5>Very Small Heading</h5>
    <h6>Least Important Heading</h6>

        <!-- note: the size of the heading decreases as the number increases. -->

</body>

</html>
