<!DOCTYPE html>
<html>

<head>
    <title>head concept</title>

    <!-- style for this page -->
    <style>
        body {
            background-color: #f0f0f0;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }
    </style>

    <!-- link to external stylesheet -->
    <link rel="stylesheet" href="mystyle.css">

    <!-- meta tags -->
    <meta charset="UTF-8">
    <meta name="description" content="Free web tutorials on HTML, CSS, JavaScript">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="MD Abdullah">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="30">

    <!-- base URL for relative links -->
    <base href="https://www.example.com/" target="_blank">

    <!-- JavaScript example -->
    <script>
        function showMessage() {
            document.getElementById("demo").innerHTML = "Hello JavaScript!";
        }
    </script>
</head>

<body>

    <h1>Welcome to My Page</h1>
    <p id="demo">This text will change when the button is clicked.</p>
    <button onclick="showMessage()">Click Me</button>

    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Curabitur sit amet.</p>

</body>

</html>
