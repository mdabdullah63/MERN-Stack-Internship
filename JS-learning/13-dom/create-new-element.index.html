<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new element</title>
</head>
<body>
    <ul class="language">
        <li>Java Script</li>
    </ul>
      
<script>
    
function addlanguage(language1){
    const li=document.createElement("li");
    // li.innerHTML=`${language1}`
    li.textContent=language1;
    document.querySelector('.language').appendChild(li)

}
addlanguage("python from add fuunction");
function addlanguage2(language1){
    const li=document.createElement("li");
    li.appendChild(document.createTextNode(language1));
    document.querySelector('.language').appendChild(li);

}
addlanguage2("go language from creaTextNode");
// replace
const editsec =document.querySelector("li:nth-child(1)");
// editsec.innerHTML="rubby";
const replacehere= document.createElement("li");
replacehere.textContent="Rubby";
editsec.replaceWith(replacehere);
// edit

const lastname=document.querySelector("li:last-child")
// lastname.outerHTML="<li>cpp</li>";
lastname.textContent="cpp";
// remove
const remo=document.querySelector("li:first-child")
remo.remove();
</script>
