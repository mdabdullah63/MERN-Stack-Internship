<body>
    <script>
        const promiseOne = new Promise((resolve, reject) => {
            setTimeout(() => {
                console.log('Async is complete');
            }, 1000)
        })
        promiseOne.then(() => {
            console.log('promise is consumed')
        })

            setTimeout(() => {
                console.log('Async task 2');

            }, 1000)
        })
